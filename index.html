<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Inspector</title>
    <meta name="theme-color" content="rgb(24,24,24)">
    <script src="./dist/index.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <style>
        html {
            background: rgb(24, 24, 24);
            color: #dedede;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            padding: 1rem;
            margin: 0;
            overflow: auto;
        }

        h1 {
            margin-top: .5rem;
        }

        .container {
            width: inherit;
            height: 420px;
            border-radius: .5rem;
            box-shadow: 0px 0px 1px 0px rgb(154 154 154);
            overflow: auto;
            padding: .5rem;
            background: #1e1e1e;
        }

        ol {
            padding-inline-start: 2rem;
        }

        hr {
            display: block;
            height: 1px;
            border: 0;
            border-top: 1px solid #424242;
            margin: 1em 0;
            padding: 0;
        }

        code {
            white-space: pre;
            background: #1e1e1e;
            padding: 1rem;
            border-radius: .5rem;
            box-shadow: 0px 0px 1px 0px rgb(154 154 154);
            height: fit-content;
            display: block;
            margin: 1rem 0;
            overflow: auto;
        }
    </style>
</head>

<body>
    <h1 style="user-select: none;">Object Inspector</h1>
    <hr>
    <h2>Demo</h2>
    <hr>
    <div id="container1" class="container"></div>
    <br>
    <div id="container2" class="container"></div>
    <h2>Usage</h2>
    <hr>
    <ol style="order: 1;">
        <li>
            <div class="heading">Import Object Inspector</div>
            <pre><code class="language-javascript">// ESM
import ObjectInspector from "./dist/index.js";</code></pre>
            <pre><code class="language-xml">&lt;!-- UMD --&gt;
&lt;script src="./dist/index.umd.js"&gt;&lt;/script&gt;</code></pre>
        </li>
        <li>
            <div class="heading">Create a new Object Inspector instance</div>
            <pre><code class="language-javascript">const viewer = new ObjectInspector(container, obj, options?);</code></pre>
        </li>
        <li>
            <div class="heading">Done</div>
        </li>
    </ol>
    <script>hljs.highlightAll();</script>
    <script>
        const obj = window;

        const div = document.createElement("div");
        div.id = "demoDiv";
        div.className = "container highlight";
        div.textContent = "Hello World";
        const span = document.createElement("span");
        span.textContent = "Inner Span";
        div.appendChild(span);
        const divProto = Object.getPrototypeOf(div);
        const circularObj = {};
        circularObj.self = circularObj;

        class BaseClass {
            constructor() {
                console.log('base');
            }
            _func() {
                throw new Error('not implemented');
            }
        }
        BaseClass.prototype.proto = 'base'

        class AbstractClass extends BaseClass {
            _func() {
                throw new Error('not implemented')
            }
        }

        class MyClass extends AbstractClass {
            constructor() {
                super()
            }
            _func() {
                console.log(1)
            }
        }
        MyClass.staticValue = 1;
        MyClass.prototype.proto = 'prototype';


        const obj2 = {
            name: "Demo Object",
            count: 42,
            active: true,
            nothing: null,
            notDefined: undefined,
            nested: {
                alpha: 1,
                beta: [10, 20, 30],
                gamma: { x: "X", y: "Y" },
            },
            list: ["one", "two", { key: "value" }],
            greet: function (name) { return `Hello ${name}`; },
            asyncFunction: async function myAsyncFunc() { },
            arrowFunction: () => { },
            asyncArrowFunction: async () => { },
            class: MyClass,
            _secret: 99,
            get secret() { return this._secret; },
            set secret(val) { this._secret = val; },
            element: div,
            elementPrototype: divProto,
            circular: circularObj,
            map: new Map([["key1", 1], ["key2", 2]]),
            set: new Set([1, 2, 3])
        };

        const container = document.getElementById('container1');
        const container2 = document.getElementById('container2');
        const inspector = new ObjectInspector(container, obj);
        const inspector2 = new ObjectInspector(container2, {
            name: "John",
            age: 30,
            address: {
                city: "New York",
                zip: 10001
            },
            emails: ["john@gmail.com", "john@example.com"]
        });

        console.log(`Object Inspector v${ObjectInspector.version}`);
    </script>
</body>

</html>
